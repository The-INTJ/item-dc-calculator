<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ContestApp — Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="components.css">
<style>
  body { font-family: var(--font-sans); }
  .canvas-host { width: 100%; height: 100vh; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root" class="canvas-host"></div>

<!-- Components -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="phone-frame.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="screens/home-screen.jsx"></script>
<script type="text/babel" src="screens/contest-detail-screen.jsx"></script>
<script type="text/babel" src="screens/vote-sheet.jsx"></script>
<script type="text/babel" src="screens/broadcast-view.jsx"></script>
<script type="text/babel" src="screens/system-reference.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact",
  "theme": "light"
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const { density, theme } = tweaks;

  // Apply to phone-frame children via a wrapper data attr; broadcast view
  // ignores both (it's its own theme).
  return (
    <>
      <DesignCanvas>
        <DCSection id="prototype" title="Mobile prototype" subtitle="The three highest-traffic screens, with the new system applied. Drag to reorder, click expand to focus.">
          <DCArtboard id="home" label="Home · signed-in landing" width={384} height={760}>
            <div data-density={density} data-theme={theme} style={{ width: '100%', height: '100%', display: 'grid', placeItems: 'center', background: '#f0eee9' }}>
              <PhoneFrame width={360} height={740} theme={theme} density={density}>
                <HomeScreen density={density} theme={theme}/>
              </PhoneFrame>
            </div>
          </DCArtboard>
          <DCArtboard id="detail" label="Contest detail · round view" width={384} height={760}>
            <div data-density={density} data-theme={theme} style={{ width: '100%', height: '100%', display: 'grid', placeItems: 'center', background: '#f0eee9' }}>
              <PhoneFrame width={360} height={740} theme={theme} density={density}>
                <ContestDetailScreen density={density}/>
              </PhoneFrame>
            </div>
          </DCArtboard>
          <DCArtboard id="vote" label="Vote sheet · scoring" width={384} height={760}>
            <div data-density={density} data-theme={theme} style={{ width: '100%', height: '100%', display: 'grid', placeItems: 'center', background: '#f0eee9' }}>
              <PhoneFrame width={360} height={740} theme={theme} density={density}>
                <VoteSheet density={density}/>
              </PhoneFrame>
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="display" title="Display mode (TV)" subtitle="Broadcast-grade for the venue screen. Always dark, always its own theme — high-contrast, animated for live moments, reduced-motion respected.">
          <DCArtboard id="broadcast" label="Broadcast · 1280×720" width={1280} height={720}>
            <BroadcastView/>
          </DCArtboard>
        </DCSection>

        <DCSection id="system" title="Design system reference" subtitle="Tokens and primitives. The migration map for the existing repo lives in the README.">
          <DCArtboard id="ref" label="System reference" width={1180} height={1320}>
            <div data-theme={theme} style={{ width: '100%', height: '100%', background: 'var(--bg-page)' }}>
              <SystemReference/>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Surface theme">
          <TweakRadio
            value={theme}
            onChange={v => setTweak('theme', v)}
            options={[
              { value: 'light', label: 'Light' },
              { value: 'dark', label: 'Dark' },
            ]}
          />
        </TweakSection>
        <TweakSection title="Mobile density">
          <TweakRadio
            value={density}
            onChange={v => setTweak('density', v)}
            options={[
              { value: 'comfortable', label: 'Comfortable' },
              { value: 'compact', label: 'Compact' },
            ]}
          />
        </TweakSection>
        <TweakSection title="Notes">
          <div style={{ fontSize: 12, color: '#64748b', lineHeight: 1.5 }}>
            Theme affects phone surfaces and the system reference. Display mode keeps its
            own broadcast theme.
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
